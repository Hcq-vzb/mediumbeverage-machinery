<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Medium Beverage Machinery - High Speed Beverage Filling Machine & Water Line</title><meta name="description" content="Medium Beverage Machinery is a leading manufacturer of beverage filling machines, water filling lines, and bottle blowing machines. We provide high-speed solutions (12000-36000 BPH) for water, juice, and carbonated drinks."><meta name="keywords" content="Beverage filling machine, Water filling line, Carbonated drink filling machine, Juice filling equipment, Barreled water filling line, Bottle blowing machine, Water treatment system, Medium Beverage Machinery"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }
    html.light, html.light body {
      background-color: #ffffff !important;
      color: #000000;
    }
    html.dark, html.dark body {
      background-color: #1a1a1a !important;
      color: #ffffff;
    }</style><script>(function() {
      const isInIframe = window.self !== window.top;
      function applyThemeToDOM(theme) {
        document.documentElement.classList.remove('light', 'dark');
        document.documentElement.classList.add(theme);
        document.documentElement.setAttribute('data-theme', theme);
      }
      if (isInIframe) {
        window.addEventListener('message', function(event) {
          if (event.data && typeof event.data.theme === 'string') {
            const theme = event.data.theme;
            if (theme === 'light' || theme === 'dark') {
              applyThemeToDOM(theme);
            }
          }
        });
      } else {
        applyThemeToDOM('light');
      }
    })();</script></head><body><div id="root"></div><script defer="defer" src="bundle.js"></script></body></html>
